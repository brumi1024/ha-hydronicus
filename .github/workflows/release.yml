name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Optional v-prefixed release tag or semantic version; defaults to manifest.json"
        required: false
        type: string
      dry_run:
        description: "Build and inspect the package without changing a GitHub Release"
        required: true
        default: true
        type: boolean

permissions: {}

jobs:
  package:
    name: Package and inspect
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -eu
          version="${RELEASE_TAG#v}"
          if [ -z "$RELEASE_TAG" ]; then
            version="$INPUT_VERSION"
          fi
          if [ -z "$version" ]; then
            version="$(python scripts/package_release.py --print-version)"
          fi
          if [ -n "$RELEASE_TAG" ] && [ "$RELEASE_TAG" = "$version" ]; then
            echo "Published release tags must use the vX.Y.Z form" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Dry-run package validation
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: python scripts/package_release.py --version "$RELEASE_VERSION" --dry-run

      - name: Build release archive
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: python scripts/package_release.py --version "$RELEASE_VERSION" --output dist/hydronicus.zip

      - name: Inspect release archive
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: python scripts/package_release.py --version "$RELEASE_VERSION" --inspect dist/hydronicus.zip

      - name: Upload dry-run artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hydronicus-${{ steps.version.outputs.version }}
          path: dist/hydronicus.zip
          if-no-files-found: error

      - name: Upload release package for publishing
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: hydronicus-release-package
          path: dist/hydronicus.zip
          if-no-files-found: error

  publish:
    name: Attach release package and notes
    if: github.event_name == 'release'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: hydronicus-release-package
          path: dist

      - name: Attach package and apply release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_VERSION: ${{ needs.package.outputs.version }}
        run: |
          set -eu
          sed "s/{{VERSION}}/$RELEASE_VERSION/g" RELEASE_NOTES.md > "$RUNNER_TEMP/release-notes.md"
          gh release edit "$RELEASE_TAG" --notes-file "$RUNNER_TEMP/release-notes.md"
          gh release upload "$RELEASE_TAG" dist/hydronicus.zip --clobber
