name: CI

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.13"
          enable-cache: true
      - run: uv sync --frozen --extra test
      - name: Check Python syntax
        run: uv run python -m compileall custom_components tests
      - name: Check JSON files
        run: uv run python -m json.tool custom_components/hydronic_climate/manifest.json >/dev/null
