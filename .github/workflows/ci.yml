name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - name: Typecheck frontend
        run: npm run lint --prefix frontend
      - name: Test frontend
        run: npm test --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend
      - name: Check generated bundle
        run: git diff --exit-code -- custom_components/hydronicus/frontend/hydronicus-plant-card.js

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.13"
          enable-cache: true
      - run: uv sync --frozen --extra test
      - name: Check Python syntax
        run: uv run python -m compileall custom_components tests
      - name: Check JSON files
        run: uv run python -m json.tool custom_components/hydronicus/manifest.json >/dev/null
